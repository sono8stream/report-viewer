<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #f7f8fa; color: #1a202c; }

  .header {
    background: linear-gradient(135deg, #2d3748 0%, #4a5568 100%);
    color: white;
    padding: 40px 32px 36px;
  }
  .header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.01em; }
  .header p { margin-top: 6px; font-size: 0.875rem; opacity: 0.7; }

  .container { max-width: 860px; margin: 0 auto; padding: 40px 16px; }

  .empty { text-align: center; color: #a0aec0; padding: 80px 0; font-size: 0.95rem; }

  .report-list { display: flex; flex-direction: column; gap: 16px; }

  .report-card {
    background: white;
    border-radius: 14px;
    padding: 24px 28px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    text-decoration: none;
    color: inherit;
    display: block;
    transition: box-shadow 0.18s, transform 0.18s;
    border-left: 4px solid #667eea;
  }
  .report-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); transform: translateY(-2px); }

  .report-title { font-size: 1.2rem; font-weight: 700; color: #2d3748; margin-bottom: 8px; }
  .report-date { font-size: 0.78rem; color: #a0aec0; margin-bottom: 14px; }

  .report-stats { display: flex; gap: 24px; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat-val { font-size: 1.4rem; font-weight: 700; color: #4a5568; }
  .stat-lbl { font-size: 0.72rem; color: #a0aec0; margin-top: 2px; }

  .divider { width: 1px; background: #e2e8f0; align-self: stretch; }
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div>
      <h1>就職先偏差値レポート</h1>
      <p>各学科・専攻の就職先分析レポート一覧</p>
    </div>
    <a id="admin-link" href="/admin" style="display:none;color:rgba(255,255,255,0.7);font-size:0.85rem;text-decoration:none;white-space:nowrap;margin-top:4px;padding:6px 14px;border:1px solid rgba(255,255,255,0.3);border-radius:6px"
       onmouseover="this.style.color='white';this.style.borderColor='white'"
       onmouseout="this.style.color='rgba(255,255,255,0.7)';this.style.borderColor='rgba(255,255,255,0.3)'">
      管理画面 →
    </a>
  </div>
</div>

<div class="container">
  <div id="list"></div>
</div>

<script>
async function load() {
  const res = await fetch('/api/saves');
  const list = await res.json();
  const el = document.getElementById('list');

  if (list.length === 0) {
    el.innerHTML = '<div class="empty">まだレポートがありません。<br>アナライザーで分析・保存してください。</div>';
    return;
  }

  el.className = 'report-list';
  el.innerHTML = list.map(s => `
    <a class="report-card" href="/reports/${s.id}">
      <div class="report-title">${esc(s.name)}</div>
      <div class="report-date">${new Date(s.savedAt).toLocaleDateString('ja-JP', {year:'numeric',month:'long',day:'numeric'})}</div>
      <div class="report-stats">
        <div class="stat">
          <div class="stat-val">${s.companyCount}</div>
          <div class="stat-lbl">対象社数</div>
        </div>
        <div class="divider"></div>
        <div class="stat">
          <div class="stat-val">${s.avg !== null ? Number(s.avg).toFixed(1) : '-'}</div>
          <div class="stat-lbl">平均偏差値</div>
        </div>
        <div class="divider"></div>
        <div class="stat">
          <div class="stat-val">${s.median !== null ? Number(s.median).toFixed(1) : '-'}</div>
          <div class="stat-lbl">中央値</div>
        </div>
      </div>
    </a>
  `).join('');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

load();

fetch('/api/admin/check', { credentials: 'include' })
  .then(r => { if (r.ok) document.getElementById('admin-link').style.display = ''; })
  .catch(() => {});
</script>
</body>
</html>
